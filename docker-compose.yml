services:
  postgres:
    image: postgres:15-alpine
    container_name: encounter-postgres
    environment:
      POSTGRES_DB: encounters
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./apps/backend
    container_name: encounter-backend
    environment:
      PORT: 8080
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/encounters
      DB_SSL: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      args:
        # Local dev: points to backend container via host port
        # Production (ECS/ALB): uses relative /api/ path (set in Dockerfile/CI)
        REACT_APP_API_URL: http://localhost:8080/api
    container_name: encounter-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
